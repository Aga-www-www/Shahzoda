<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taammul</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

font-family:"Georgia",serif;

background:
linear-gradient(
rgba(0,0,0,0.75),
rgba(0,0,0,0.85)
),
url("https://images.unsplash.com/photo-1512820790803-83ca734da790?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;

overflow-x:hidden;

}



/* yuraklar */

.heart{

position:fixed;

bottom:-50px;

font-size:25px;

animation:heartMove 10s linear infinite;

opacity:.7;

}


@keyframes heartMove{

0%{
transform:translateY(0);
opacity:0;
}

30%{
opacity:1;
}

100%{

transform:translateY(-110vh);

opacity:0;

}

}





.container{

width:100%;

max-width:900px;

margin:auto;

padding:50px 20px;

}




.card{

background:

rgba(255,255,255,0.12);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.2);

border-radius:35px;

padding:50px;

box-shadow:

0 25px 80px rgba(0,0,0,.6);


animation:appear 1.5s ease;


}



@keyframes appear{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}




h1{


text-align:center;

font-size:65px;

letter-spacing:12px;

color:#f5d77a;


text-shadow:

0 0 20px #f5d77a;


margin-bottom:40px;


}




h2{


text-align:center;

font-size:32px;

color:#f5d77a;

margin:40px 0 25px;


}




p{


font-size:21px;

line-height:2;

color:#f8f8f8;

margin-bottom:25px;


}




button{


display:block;

margin:40px auto 0;


padding:16px 55px;


border:none;

border-radius:50px;


background:

linear-gradient(
45deg,
#f5d77a,
#b88920
);


font-size:20px;


cursor:pointer;


transition:.4s;


}



button:hover{


transform:scale(1.1);


box-shadow:

0 0 40px #f5d77a;


}





#meaning{

display:none;

}





.quote{

text-align:center;

font-size:25px;

font-style:italic;

color:#f5d77a;

margin:40px 0;


}




@media(max-width:600px){

.card{

padding:25px;

}


h1{

font-size:40px;

letter-spacing:5px;

}


p{

font-size:17px;

}


h2{

font-size:25px;

}


}


</style>

</head>


<body>


<div class="heart">❤️</div>
<div class="heart" style="left:20%;animation-delay:2s">🤍</div>
<div class="heart" style="left:70%;animation-delay:5s">❤️</div>
<div class="heart" style="left:90%;animation-delay:7s">🤍</div>


<div class="container">

<div class="card">


<div id="intro">


<h1>TAAMMUL</h1>


<p style="text-align:center">

Don't rush...<br><br>

Take a few moments to be alone with yourself.<br>

Calm your breathing.<br>

Collect your thoughts.<br><br>


Try to read every line not only with your eyes,
but with your heart.


</p>


<button onclick="openLetter()">

I am ready

</button>


</div>
